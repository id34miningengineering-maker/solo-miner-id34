<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Bitcoin Miner — Texas Built · ID34 Mining and Sustainable Engineering</title>
<meta name="description" content="Hand-built ESP32 solo Bitcoin miners. Texas built. 3D printed. Open source. Plug in, connect to WiFi, enter BTC address.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-size:18px;line-height:1.6;font-weight:400}

/* TICKER */
.ticker-bar{background:#f97316;overflow:hidden;white-space:nowrap;padding:10px 0}
.ticker-inner{display:inline-block;animation:scroll 40s linear infinite;font-family:'DM Mono',monospace;font-size:.9rem;letter-spacing:3px;color:#000;font-weight:700}
@keyframes scroll{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08);padding:0 48px;height:68px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{text-decoration:none;line-height:1.15}
.nav-name{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:3px;color:#fff}
.nav-name span{color:#f97316}
.nav-sub{display:block;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-top:2px}
.nav-btn{background:#f97316;color:#000;padding:13px 30px;border-radius:7px;font-weight:700;font-size:1rem;text-decoration:none;letter-spacing:.5px;transition:background .15s,transform .15s}
.nav-btn:hover{background:#fbbf24;transform:translateY(-2px)}

/* HERO */
.hero{display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:64px;padding:80px 64px;min-height:90vh;background:radial-gradient(ellipse at 65% 50%,rgba(249,115,22,.07) 0%,transparent 65%)}
.hero-kicker{font-family:'DM Mono',monospace;font-size:.9rem;letter-spacing:3px;text-transform:uppercase;color:#f97316;font-weight:700;margin-bottom:20px}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,7vw,6.5rem);line-height:.9;letter-spacing:2px;margin-bottom:28px}
.hero h1 em{color:#f97316;font-style:normal;display:block}
.hero-body{font-size:1.1rem;color:#fff;line-height:1.7;font-weight:400;max-width:500px;margin-bottom:36px}
.hero-body strong{color:#f97316;font-weight:700}

/* FACT BOX */
.fact-box{border-left:3px solid #f97316;padding:18px 24px;margin-bottom:36px;background:rgba(249,115,22,.06);border-radius:0 8px 8px 0;max-width:520px}
.fact-box p{font-size:1.05rem;color:#fff;line-height:1.8;font-weight:400}
.fact-box cite{display:block;font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:1px;color:#f97316;margin-top:10px;font-style:normal;font-weight:600}

.btn-stack{display:flex;flex-direction:column;gap:14px;max-width:480px}
.btn{display:block;text-align:center;padding:19px 28px;border-radius:9px;font-size:1.05rem;font-weight:700;text-decoration:none;transition:all .18s;letter-spacing:.3px}
.btn-main{background:#f97316;color:#000}
.btn-main:hover{background:#fbbf24;transform:translateY(-2px);box-shadow:0 12px 40px rgba(249,115,22,.35)}
.btn-venmo{background:#1a1a1a;color:#fff;border:2px solid rgba(255,255,255,.15)}
.btn-venmo:hover{border-color:#f97316;color:#f97316}
.btn-note{font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:1px;color:rgba(255,255,255,.6);font-weight:600;text-align:center;line-height:1.9}

/* HERO IMAGE - RESPONSIVE */
.hero-img{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.8);max-width:100%;width:100%}
.hero-img img{width:100%;height:auto;max-height:70vh;object-fit:cover;object-position:center;display:block}
.live-dot{position:absolute;top:16px;left:16px;background:rgba(0,0,0,.88);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px);border-radius:8px;padding:9px 16px;display:flex;align-items:center;gap:9px}
.pulse{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
.live-dot span{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:2px;color:#22c55e;font-weight:600}

/* FACTS BAND */
.facts-band{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid rgba(255,255,255,.07);border-bottom:1px solid rgba(255,255,255,.07);background:#0f0f0f}
.fact{padding:30px 20px;text-align:center;border-right:1px solid rgba(255,255,255,.07)}
.fact:last-child{border-right:none}
.fact-label{font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:2px;text-transform:uppercase;color:#f97316;margin-bottom:12px;font-weight:700}
.fact-text{font-size:1rem;color:#fff;line-height:1.7;font-weight:400}

/* BATCH STRIP */
.batch-strip{background:#111;border-bottom:1px solid rgba(249,115,22,.15);padding:16px 64px;text-align:center}
.batch-strip p{font-family:'DM Mono',monospace;font-size:.9rem;letter-spacing:1px;color:#fff;line-height:2;font-weight:600}
.batch-strip a{color:#f97316;text-decoration:none}
.batch-strip a:hover{text-decoration:underline}

/* VIDEO */
.video-sec{padding:80px 64px;text-align:center;background:#0a0a0a}
.section-label{font-family:'DM Mono',monospace;font-size:.9rem;letter-spacing:3px;text-transform:uppercase;color:#fff;margin-bottom:14px;font-weight:700}
.section-label + h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,3.5vw,3.5rem);letter-spacing:2px;color:#fff;margin-bottom:40px}
.section-label + h2 em{color:#f97316;font-style:normal}
.video-wrap{max-width:680px;margin:0 auto;border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7);aspect-ratio:9/16;max-height:500
